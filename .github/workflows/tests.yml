name: tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: papenajam
          POSTGRES_PASSWORD: papenajam
          POSTGRES_DB: db_development
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U papenajam"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # Nilai ini menang atas .env.example (Dotenv immutable tidak menimpa env yang sudah ada)
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: db_development
      DB_USERNAME: papenajam
      DB_PASSWORD: papenajam

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: pdo_pgsql, pgsql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'

      - name: Setup Application
        run: composer setup

      - name: Run CI Checks
        run: composer ci:check
