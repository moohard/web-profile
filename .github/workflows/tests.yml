name: tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  sqlite:
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: pdo_pgsql, pgsql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'

      - name: Setup Application
        run: composer setup

      - name: Run CI Checks
        run: composer ci:check

  postgres:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: papenajam
          POSTGRES_PASSWORD: papenajam
          POSTGRES_DB: db_development
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U papenajam"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      # Nilai ini menang atas .env.example (Dotenv immutable tidak menimpa env yang sudah ada)
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: db_development
      DB_USERNAME: papenajam
      DB_PASSWORD: papenajam

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: pdo_pgsql, pgsql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '22'

      - name: Setup Application
        run: composer setup

      - name: Run CI Checks
        run: composer ci:check
